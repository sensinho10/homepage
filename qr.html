<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Visitenkarte</title>
  <meta name="theme-color" content="#0F3D44">

  <!-- iOS: als Vollbild-App vom Homescreen starten -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Visitenkarte">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="fonts.css">
  <style>
    :root {
      --teal: #0F3D44;
      --teal-dark: #0A2C31;
      --gold: #D98A2B;
      --gold-light: #E9A54E;
      --cream: #FBFAF6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--teal);
      overflow: hidden;
    }
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      min-height: 100dvh;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
      background: linear-gradient(170deg, var(--teal) 0%, var(--teal-dark) 100%);
      text-align: center;
    }
    .name {
      color: var(--cream);
      font-size: clamp(1.3rem, 6vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .tagline {
      color: var(--gold);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }
    .qr-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(217, 138, 43, 0.3);
    }
    .qr-card img {
      display: block;
      width: min(62vw, 320px);
      height: min(62vw, 320px);
      border-radius: 6px;
    }
    .hint {
      color: rgba(251, 250, 246, 0.55);
      font-size: 0.85rem;
      margin-top: 28px;
      max-width: 260px;
      line-height: 1.5;
    }
    .hint strong { color: var(--gold-light); }
  </style>
</head>
<body>
  <div class="name">Stephan Senser</div>
  <div class="tagline">KI &amp; AUTOMATISIERUNG</div>

  <div class="qr-card">
    <img src="qr-code.png" alt="QR-Code zur Visitenkarte">
  </div>

  <p class="hint"><strong>QR-Code scannen</strong><br>für meine Kontaktdaten &amp; direkte Kontaktaufnahme.</p>
</body>
</html>
